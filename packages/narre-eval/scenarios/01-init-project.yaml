id: init-project
description: "빈 프로젝트에 역사 도메인 타입 세팅 요청"
tags: [archetype, init]

seed:
  project:
    name: "조선시대"
    root_dir: "C:/tmp/eval-project"

turns:
  - role: user
    content: "역사 프로젝트야. 인물, 사건, 장소 아크타입이 필요해. 만들어줘."

assertions:
  db:
    - table: archetypes
      expect:
        count_min: 3
        column_includes:
          name: ["인물", "사건", "장소"]

  response:
    - contains_all: ["인물", "사건", "장소"]
    - no_error: true

  tool_count:
    min: 3
    max: 20

  qualitative:
    - rubric: "사용자가 요청한 3개 아크타입을 정확히 생성했는가"
    - rubric: "생성 결과를 명확히 보고했는가"
