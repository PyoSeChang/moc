id: type-update
description: "기존 아크타입 이름 변경"
tags: [archetype, update]

seed:
  project:
    name: "조선시대"
    root_dir: "C:/tmp/eval-project"
  archetypes:
    - name: "인물"
      icon: "user"
      color: "#4A90D9"
    - name: "사건"
      icon: "calendar"
      color: "#E74C3C"
    - name: "장소"
      icon: "map-pin"
      color: "#2ECC71"

turns:
  - role: user
    content: "사건 아크타입을 문헌으로 이름 바꿔줘"

assertions:
  db:
    - table: archetypes
      expect:
        column_includes:
          name: ["인물", "문헌", "장소"]

  db_absent:
    - table: archetypes
      condition: "name = '사건'"

  response:
    - contains_all: ["문헌"]
    - no_error: true

  tool_count:
    min: 1
    max: 10

  qualitative:
    - rubric: "기존 아크타입의 이름만 변경하고 다른 속성은 유지했는가"
    - rubric: "변경 결과를 명확히 보고했는가"
