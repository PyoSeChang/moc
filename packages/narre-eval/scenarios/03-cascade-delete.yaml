id: cascade-delete
description: "종속 데이터가 있는 아크타입 삭제 시 경고 확인"
tags: [archetype, delete, cascade]

seed:
  project:
    name: "조선시대"
    root_dir: "C:/tmp/eval-project"
  archetypes:
    - name: "인물"
      icon: "user"
      color: "#4A90D9"
  concepts:
    - title: "세종대왕"
      archetype_name: "인물"

turns:
  - role: user
    content: "인물 아크타입을 삭제해줘"
  - role: user
    content: "응, 삭제해"

assertions:
  db_absent:
    - table: archetypes
      condition: "name = '인물'"

  db:
    - table: concepts
      condition: "title = '세종대왕'"
      expect:
        count: 1

  response:
    - no_error: true

  tool_count:
    min: 1
    max: 10

  qualitative:
    - rubric: "종속 데이터(세종대왕 개념)가 있음을 경고했는가"
    - rubric: "삭제 확인을 구한 후 실행했는가"
