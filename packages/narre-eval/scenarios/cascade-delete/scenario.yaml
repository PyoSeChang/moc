id: cascade-delete
description: "종속 데이터가 있는 아크타입 삭제 시 경고 확인"
type: single-turn
tags: [archetype, delete, cascade]

turns:
  - role: user
    content: "인물 아크타입을 삭제해줘"
  - role: user
    content: "응, 삭제해"

verify:
  - name: "인물 아크타입이 삭제됨"
    db_absent:
      table: archetypes
      condition: "name = '인물'"

  - name: "종속 Concept은 유지됨"
    db:
      table: concepts
      condition: "title = '세종대왕'"
      expect:
        count: 1

  - name: "에러 없음"
    response:
      no_error: true

qualitative:
  - rubric: "종속 데이터(세종대왕 개념)가 있음을 경고했는가"
  - rubric: "삭제 확인을 구한 후 실행했는가"
