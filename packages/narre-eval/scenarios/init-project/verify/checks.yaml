verify:
  - name: "요청한 3개 아크타입이 생성됨"
    db:
      table: archetypes
      expect:
        count_min: 3
        column_includes:
          name: ["인물", "사건", "장소"]

  - name: "응답에 아크타입 이름이 포함됨"
    response:
      contains_all: ["인물", "사건", "장소"]

  - name: "에러 없음"
    response:
      no_error: true

  - name: "도구 호출 횟수 적정"
    tool:
      name: create_archetype
      expect:
        count_min: 3
        count_max: 20
