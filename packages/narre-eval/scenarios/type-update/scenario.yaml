id: type-update
description: "기존 아크타입 이름 변경"
type: single-turn
tags: [archetype, update]

turns:
  - role: user
    content: "사건 아크타입을 문헌으로 이름 바꿔줘"

verify:
  - name: "아크타입 이름이 문헌으로 변경됨"
    db:
      table: archetypes
      expect:
        column_includes:
          name: ["인물", "문헌", "장소"]

  - name: "기존 사건 아크타입이 제거됨"
    db_absent:
      table: archetypes
      condition: "name = '사건'"

  - name: "응답에 문헌 포함"
    response:
      contains_all: ["문헌"]

  - name: "에러 없음"
    response:
      no_error: true

qualitative:
  - rubric: "기존 아크타입의 이름만 변경하고 다른 속성은 유지했는가"
  - rubric: "변경 결과를 명확히 보고했는가"
