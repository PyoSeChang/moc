verify:
  # ── Existing checks (preserved) ──

  - name: "아크타입 이름이 문헌으로 변경됨"
    db:
      table: archetypes
      expect:
        column_includes:
          name: ["인물", "문헌", "장소"]

  - name: "기존 사건 아크타입이 제거됨"
    db_absent:
      table: archetypes
      condition: "name = '사건'"

  - name: "응답에 문헌 포함"
    response:
      contains_all: ["문헌"]

  - name: "에러 없음"
    response:
      no_error: true

  # ── Row match: renamed row exists with original attributes preserved ──

  - name: "문헌 아크타입이 사건의 색상을 유지함"
    db_row_match:
      table: archetypes
      match:
        name: "문헌"
      expect_columns:
        color: "#E74C3C"

  # ── Side-effect: no unintended row creation or deletion ──

  - name: "아크타입 총 개수가 3개로 유지됨"
    side_effect:
      table: archetypes
      expect_count: 3

  - name: "개념 테이블이 영향받지 않음"
    side_effect:
      table: concepts
      expect_count: 0

  # ── Tool sequence: lookup before mutation ──

  - name: "조회 후 수정 순서"
    tool:
      name: update_archetype
      expect:
        count_min: 1
      sequence:
        - list_archetypes
        - update_archetype
